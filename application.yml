server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "youshallnotpass"
    sources:
      youtube: false      # disabled — handled by the plugin below
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      # FIX: TVHTML5EMBEDDED + ANDROID_TESTSUITE are most reliable for avoiding rate limits
      - TVHTML5EMBEDDED
      - ANDROID_TESTSUITE
      - MUSIC
      - WEB
      - WEBEMBEDDED
      - ANDROID

logging:
  level:
    root: INFO
    lavalink: INFO
